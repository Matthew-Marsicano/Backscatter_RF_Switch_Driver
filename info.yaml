# Tiny Tapeout project information
project:
  title:        "BLE Backscatter Modem"
  author:       "Backscatter Radio Team"
  discord:      ""
  description:  "BLE advertising digital baseband and multi-phase backscatter RF-switch controller"
  language:     "Verilog"
  clock_hz:     64000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_ble_backscatter_modem"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_ble_backscatter_modem.v"
    - "ble_modem_top.v"
    - "sync_reset.v"
    - "spi_slave.v"
    - "config_regs.v"
    - "payload_fifo.v"
    - "pdu_assembler.v"
    - "packet_fsm.v"
    - "crc24.v"
    - "whitening_lfsr.v"
    - "symbol_timing.v"
    - "phase_generator.v"
    - "modulator.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "spi_sclk"
  ui[1]: "spi_mosi"
  ui[2]: "spi_cs_n"
  ui[3]: "tx_start"
  ui[4]: "mode_sel"
  ui[5]: "chan_quick[0]"
  ui[6]: "chan_quick[1]"
  ui[7]: "chan_quick[2]"

  # Outputs
  uo[0]: "phase_ctrl[0]"
  uo[1]: "phase_ctrl[1]"
  uo[2]: "phase_ctrl[2]"
  uo[3]: "phase_ctrl[3]"
  uo[4]: "tx_active"
  uo[5]: "sym_clk"
  uo[6]: "done"
  uo[7]: "irq"

  # Bidirectional pins
  uio[0]: "spi_miso"
  uio[1]: "debug[0]"
  uio[2]: "debug[1]"
  uio[3]: "debug[2]"
  uio[4]: "debug[3]"
  uio[5]: "debug[4]"
  uio[6]: "debug[5]"
  uio[7]: "debug[6]"

# Do not change!
yaml_version: 6
