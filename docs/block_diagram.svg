<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1100" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
<title>BLE backscatter modem block diagram with full tile pinout</title>
<desc>All tt_um_ble_backscatter_modem tile-level pins (ui_in, uo_out, uio) labeled on the boundary and linked into the internal blocks that drive or consume them, with the internal data flow shown top-to-bottom through Sync + Reset, SPI Slave, Config Regs, Payload FIFO, Packet FSM, Symbol Timing, and the Modulator (which also takes cfg_phase_sel from Config Regs to pick Config A or Config B), ending at an off-chip RF switch/antenna.</desc>
<style>
  text { fill: #1a1a1a; }
  .ts { font-size: 12px; fill: #555555; }
  .th { font-size: 14px; font-weight: 500; }
  .arr { stroke: #666666; stroke-width: 1.5; fill: none; }
  .c-gray > rect { fill: #f5f5f5; stroke: #9e9e9e; }
  .c-gray > text.th { fill: #424242; }
  .c-gray > text.ts { fill: #616161; }
  .c-teal > rect { fill: #e0f2f1; stroke: #00897b; }
  .c-teal > text.th { fill: #004d40; }
  .c-teal > text.ts { fill: #00695c; }
  .c-purple > rect { fill: #ede7f6; stroke: #7e57c2; }
  .c-purple > text.th { fill: #311b92; }
  .c-purple > text.ts { fill: #4527a0; }
  .c-coral > rect { fill: #fbe9e7; stroke: #ff7043; }
  .c-coral > text.th { fill: #bf360c; }
  .c-coral > text.ts { fill: #d84315; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="ts" x="115" y="90" text-anchor="start">tt_um_ble_backscatter_modem</text>

<g class="c-gray">
  <rect x="100" y="70" width="480" height="1000" rx="20" stroke-width="0.5"/>
</g>

<!-- Sync + Reset: tall box, 9 tile inputs enter on the left edge -->
<g class="c-teal">
  <rect x="240" y="100" width="200" height="230" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="126" text-anchor="middle" dominant-baseline="central">Sync + Reset</text>
  <text class="ts" x="340" y="144" text-anchor="middle" dominant-baseline="central">2-flop input sync</text>
</g>

<text class="ts" x="90" y="120" text-anchor="end" dominant-baseline="central">clk</text>
<line x1="95" y1="120" x2="240" y2="120" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="90" y="144" text-anchor="end" dominant-baseline="central">rst_n</text>
<line x1="95" y1="144" x2="240" y2="144" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="90" y="168" text-anchor="end" dominant-baseline="central">ena</text>
<line x1="95" y1="168" x2="240" y2="168" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="90" y="192" text-anchor="end" dominant-baseline="central">ui_in[0] sclk</text>
<line x1="95" y1="192" x2="240" y2="192" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="90" y="216" text-anchor="end" dominant-baseline="central">ui_in[1] mosi</text>
<line x1="95" y1="216" x2="240" y2="216" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="90" y="240" text-anchor="end" dominant-baseline="central">ui_in[2] cs_n</text>
<line x1="95" y1="240" x2="240" y2="240" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="90" y="264" text-anchor="end" dominant-baseline="central">ui_in[3] tx_start</text>
<line x1="95" y1="264" x2="240" y2="264" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="90" y="288" text-anchor="end" dominant-baseline="central">ui_in[4] mode_sel</text>
<line x1="95" y1="288" x2="240" y2="288" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="90" y="312" text-anchor="end" dominant-baseline="central">ui_in[7:5] chan_quick</text>
<line x1="95" y1="312" x2="240" y2="312" class="arr" marker-end="url(#arrow)"/>

<line x1="340" y1="330" x2="340" y2="390" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="360" text-anchor="start">sclk_s, mosi_s, cs_n_s</text>

<!-- SPI Slave -->
<g class="c-teal">
  <rect x="250" y="390" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="408" text-anchor="middle" dominant-baseline="central">SPI Slave</text>
  <text class="ts" x="340" y="426" text-anchor="middle" dominant-baseline="central">Reg + payload I/O</text>
</g>
<line x1="430" y1="408" x2="585" y2="408" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="590" y="408" text-anchor="start">uio[0] spi_miso</text>

<!-- T-branch: SPI Slave -> Config Regs / Payload FIFO -->
<path d="M340 446 L340 466 L250 466 L250 486" fill="none" class="arr" marker-end="url(#arrow)"/>
<path d="M340 446 L340 466 L430 466 L430 486" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="260" y="480" text-anchor="end">reg_wr_addr/data</text>
<text class="ts" x="440" y="480" text-anchor="start">pay_wr_en/data</text>

<!-- Config Regs / Payload FIFO -->
<g class="c-teal">
  <rect x="180" y="486" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="250" y="504" text-anchor="middle" dominant-baseline="central">Config Regs</text>
  <text class="ts" x="250" y="522" text-anchor="middle" dominant-baseline="central">chan, len, hdr</text>
</g>
<g class="c-teal">
  <rect x="360" y="486" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="430" y="504" text-anchor="middle" dominant-baseline="central">Payload FIFO</text>
  <text class="ts" x="430" y="522" text-anchor="middle" dominant-baseline="central">8-byte buffer</text>
</g>

<line x1="250" y1="542" x2="250" y2="622" class="arr" marker-end="url(#arrow)"/>
<line x1="410" y1="542" x2="410" y2="622" class="arr" marker-end="url(#arrow)"/>
<line x1="430" y1="622" x2="430" y2="542" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="240" y="575" text-anchor="end">cfg_chan/len/hdr0</text>
<text class="ts" x="400" y="575" text-anchor="end">fifo_rd_data/empty</text>
<text class="ts" x="440" y="575" text-anchor="start">fifo_rd_en</text>

<!-- Config Regs -> Modulator: cfg_phase_sel (Config A/B select), routed down the left margin -->
<path d="M180 504 L105 504 L105 936 L210 936" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="110" y="700" text-anchor="start">cfg_phase_sel</text>

<!-- Packet FSM: tall box, 4 tile outputs exit on the right edge -->
<g class="c-purple">
  <rect x="250" y="622" width="180" height="120" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="640" text-anchor="middle" dominant-baseline="central">Packet FSM</text>
  <text class="ts" x="340" y="658" text-anchor="middle" dominant-baseline="central">CRC-24 + whitening</text>
</g>
<line x1="430" y1="670" x2="585" y2="670" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="590" y="670" text-anchor="start">uo_out[4] tx_active</text>
<line x1="430" y1="690" x2="585" y2="690" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="590" y="690" text-anchor="start">uo_out[6] done</text>
<line x1="430" y1="710" x2="585" y2="710" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="590" y="710" text-anchor="start">uo_out[7] irq</text>
<line x1="430" y1="730" x2="585" y2="730" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="590" y="730" text-anchor="start">uio[7:1] debug</text>

<!-- Packet FSM <-> Symbol Timing -->
<line x1="350" y1="742" x2="350" y2="812" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="360" y="777" text-anchor="start">run</text>
<line x1="400" y1="812" x2="400" y2="742" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="410" y="777" text-anchor="start">tick</text>

<g class="c-purple">
  <rect x="324" y="812" width="152" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="400" y="830" text-anchor="middle" dominant-baseline="central">Symbol Timing</text>
  <text class="ts" x="400" y="848" text-anchor="middle" dominant-baseline="central">1 Mbit/s ticks</text>
</g>
<line x1="476" y1="830" x2="585" y2="830" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="590" y="830" text-anchor="start">uo_out[5] sym_clk</text>

<!-- Packet FSM -> Modulator, routed right of the cfg_phase_sel corridor and left of Symbol Timing -->
<path d="M280 742 L280 890 L320 890 L320 908" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="270" y="840" text-anchor="end">data_bit, tx_active</text>

<!-- Modulator: two config inputs converge, one from each side -->
<g class="c-coral">
  <rect x="210" y="908" width="220" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="320" y="926" text-anchor="middle" dominant-baseline="central">Modulator</text>
  <text class="ts" x="320" y="944" text-anchor="middle" dominant-baseline="central">DSB-FSK / SSB drive</text>
</g>
<text class="ts" x="520" y="936" text-anchor="end">ui_in[4] mode_sel</text>
<line x1="525" y1="936" x2="430" y2="936" class="arr" marker-end="url(#arrow)"/>

<line x1="320" y1="964" x2="320" y2="1014" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="330" y="991" text-anchor="start">uo_out[3:0] phase_ctrl</text>

<g class="c-gray">
  <rect x="220" y="1014" width="200" height="56" rx="8" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text class="th" x="320" y="1032" text-anchor="middle" dominant-baseline="central">RF switch / antenna</text>
  <text class="ts" x="320" y="1050" text-anchor="middle" dominant-baseline="central">off-chip, external</text>
</g>
</svg>
